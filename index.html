<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Empathy Phrasebook - Expanded</title>
    <style>
        :root {
            --metro-blue: #0057B8;
            --metro-dark: #003B7E;
            --metro-cyan: #00B2E3;
            --metro-purple: #6B2D8E;
            --metro-magenta: #E6007E;
            --metro-green: #00A651;
            --metro-orange: #F37021;
            --metro-yellow: #FFC600;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #1A1A2E;
            --text-secondary: #5A5A7A;
            --border: #E2E8F0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
        }

        [data-theme="dark"] {
            --bg: #0F1117;
            --card-bg: #1A1D29;
            --text: #E8E8F0;
            --text-secondary: #8A8AA0;
            --border: #2A2D3A;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .header {
            background: linear-gradient(135deg, var(--metro-blue) 0%, var(--metro-purple) 100%);
            color: white;
            padding: 40px 20px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.3;
        }

        .header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; position: relative; letter-spacing: -0.5px; }
        .header p { font-size: 1.1rem; opacity: 0.9; position: relative; }
        .header-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 12px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.3); }

        .search-container {
            max-width: 700px;
            margin: -30px auto 30px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }
        .search-box {
            width: 100%;
            padding: 18px 24px 18px 56px;
            border: none;
            border-radius: var(--radius);
            font-size: 1.05rem;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            color: var(--text);
            transition: all 0.3s ease;
        }
        .search-box:focus { outline: none; box-shadow: 0 0 0 3px rgba(0,87,184,0.15), var(--shadow-hover); }
        .search-box::placeholder { color: var(--text-secondary); }
        .search-icon { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 1.2rem; }
        .search-stats { text-align: center; margin-top: 10px; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }

        .filter-container {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .filter-pill {
            padding: 8px 18px;
            border-radius: 50px;
            border: 2px solid transparent;
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            user-select: none;
        }
        .filter-pill:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .filter-pill.active { background: var(--metro-blue); color: white; border-color: var(--metro-blue); }
        .filter-pill .count { background: rgba(0,0,0,0.1); padding: 2px 8px; border-radius: 50px; font-size: 0.75rem; margin-left: 6px; }
        .filter-pill.active .count { background: rgba(255,255,255,0.25); }

        .recent-section {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 20px;
            display: none;
        }
        .recent-section.visible { display: block; }
        .recent-title { font-size: 0.9rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .recent-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .recent-chip {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }
        .recent-chip:hover { background: var(--metro-blue); color: white; border-color: var(--metro-blue); }

        .content { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; }
        .category-section { margin-bottom: 32px; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 0 4px; }
        .category-icon { width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .category-title { font-size: 1.25rem; font-weight: 700; color: var(--text); }
        .category-count { background: var(--bg); color: var(--text-secondary); padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
        @media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr; } }

        .phrase-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border-left: 4px solid;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .phrase-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
        .phrase-card.copied { animation: copiedPulse 0.6s ease; }
        @keyframes copiedPulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .card-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; opacity: 0.8; }
        .card-text { font-size: 0.95rem; line-height: 1.6; color: var(--text); font-style: italic; }
        .card-actions { display: flex; gap: 8px; margin-top: 12px; opacity: 0; transition: opacity 0.2s ease; }
        .phrase-card:hover .card-actions { opacity: 1; }
        .action-btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn.copy { background: var(--bg); color: var(--text); }
        .action-btn.copy:hover { background: var(--metro-blue); color: white; }
        .action-btn.fav { background: var(--bg); color: var(--text); }
        .action-btn.fav:hover, .action-btn.fav.active { background: #FFF3E0; color: var(--metro-orange); }
        [data-theme="dark"] .action-btn.fav:hover, [data-theme="dark"] .action-btn.fav.active { background: #3D2A1A; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast-icon { font-size: 1.2rem; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
        .empty-state h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }

        .cat-billing { border-left-color: var(--metro-magenta); }
        .cat-billing .category-icon { background: #FCE4EC; }
        [data-theme="dark"] .cat-billing .category-icon { background: #2D1A24; }
        .cat-billing .card-label { color: var(--metro-magenta); }

        .cat-service { border-left-color: var(--metro-cyan); }
        .cat-service .category-icon { background: #E0F7FA; }
        [data-theme="dark"] .cat-service .category-icon { background: #1A2D30; }
        .cat-service .card-label { color: var(--metro-cyan); }

        .cat-account { border-left-color: var(--metro-blue); }
        .cat-account .category-icon { background: #E3F2FD; }
        [data-theme="dark"] .cat-account .category-icon { background: #1A2430; }
        .cat-account .card-label { color: var(--metro-blue); }

        .cat-device { border-left-color: var(--metro-orange); }
        .cat-device .category-icon { background: #FFF3E0; }
        [data-theme="dark"] .cat-device .category-icon { background: #2D2215; }
        .cat-device .card-label { color: var(--metro-orange); }

        .cat-order { border-left-color: var(--metro-green); }
        .cat-order .category-icon { background: #E8F5E9; }
        [data-theme="dark"] .cat-order .category-icon { background: #1A2D1F; }
        .cat-order .card-label { color: var(--metro-green); }

        .cat-security { border-left-color: var(--metro-purple); }
        .cat-security .category-icon { background: #F3E5F5; }
        [data-theme="dark"] .cat-security .category-icon { background: #2A1A30; }
        .cat-security .card-label { color: var(--metro-purple); }

        .cat-promo { border-left-color: #FF6F00; }
        .cat-promo .category-icon { background: #FFF8E1; }
        [data-theme="dark"] .cat-promo .category-icon { background: #2D2A15; }
        .cat-promo .card-label { color: #FF6F00; }

        .cat-appointment { border-left-color: #795548; }
        .cat-appointment .category-icon { background: #EFEBE9; }
        [data-theme="dark"] .cat-appointment .category-icon { background: #2D2825; }
        .cat-appointment .card-label { color: #795548; }

        .cat-process { border-left-color: #607D8B; }
        .cat-process .category-icon { background: #ECEFF1; }
        [data-theme="dark"] .cat-process .category-icon { background: #1A2025; }
        .cat-process .card-label { color: #607D8B; }

        .cat-feedback { border-left-color: var(--metro-yellow); }
        .cat-feedback .category-icon { background: #FFFDE7; }
        [data-theme="dark"] .cat-feedback .category-icon { background: #2D2A15; }
        .cat-feedback .card-label { color: #F9A825; }

        .cat-escalation { border-left-color: #D32F2F; }
        .cat-escalation .category-icon { background: #FFEBEE; }
        [data-theme="dark"] .cat-escalation .category-icon { background: #2D1A1A; }
        .cat-escalation .card-label { color: #D32F2F; }

        .cat-setup { border-left-color: #009688; }
        .cat-setup .category-icon { background: #E0F2F1; }
        [data-theme="dark"] .cat-setup .category-icon { background: #1A2D2A; }
        .cat-setup .card-label { color: #009688; }

        .cat-dispute { border-left-color: #E91E63; }
        .cat-dispute .category-icon { background: #FCE4EC; }
        [data-theme="dark"] .cat-dispute .category-icon { background: #2D1A22; }
        .cat-dispute .card-label { color: #E91E63; }

        .cat-protection { border-left-color: #3F51B5; }
        .cat-protection .category-icon { background: #E8EAF6; }
        [data-theme="dark"] .cat-protection .category-icon { background: #1A1A2D; }
        .cat-protection .card-label { color: #3F51B5; }

        .cat-family { border-left-color: #9C27B0; }
        .cat-family .category-icon { background: #F3E5F5; }
        [data-theme="dark"] .cat-family .category-icon { background: #2A1A2D; }
        .cat-family .card-label { color: #9C27B0; }

        .cat-byod { border-left-color: #00BCD4; }
        .cat-byod .category-icon { background: #E0F7FA; }
        [data-theme="dark"] .cat-byod .category-icon { background: #1A2A2D; }
        .cat-byod .card-label { color: #00BCD4; }

        .cat-store { border-left-color: #FF5722; }
        .cat-store .category-icon { background: #FBE9E7; }
        [data-theme="dark"] .cat-store .category-icon { background: #2D1A15; }
        .cat-store .card-label { color: #FF5722; }

        .cat-accessibility { border-left-color: #8BC34A; }
        .cat-accessibility .category-icon { background: #F1F8E9; }
        [data-theme="dark"] .cat-accessibility .category-icon { background: #1F2D15; }
        .cat-accessibility .card-label { color: #8BC34A; }

        .cat-competitive { border-left-color: #FF9800; }
        .cat-competitive .category-icon { background: #FFF3E0; }
        [data-theme="dark"] .cat-competitive .category-icon { background: #2D2215; }
        .cat-competitive .card-label { color: #FF9800; }

        .cat-data { border-left-color: #2196F3; }
        .cat-data .category-icon { background: #E3F2FD; }
        [data-theme="dark"] .cat-data .category-icon { background: #1A2430; }
        .cat-data .card-label { color: #2196F3; }

        .cat-messaging { border-left-color: #4CAF50; }
        .cat-messaging .category-icon { background: #E8F5E9; }
        [data-theme="dark"] .cat-messaging .category-icon { background: #1A2D1A; }
        .cat-messaging .card-label { color: #4CAF50; }

        .cat-recovery { border-left-color: #F44336; }
        .cat-recovery .category-icon { background: #FFEBEE; }
        [data-theme="dark"] .cat-recovery .category-icon { background: #2D1A1A; }
        .cat-recovery .card-label { color: #F44336; }

        .cat-closing { border-left-color: #607D8B; }
        .cat-closing .category-icon { background: #ECEFF1; }
        [data-theme="dark"] .cat-closing .category-icon { background: #1A2025; }
        .cat-closing .card-label { color: #607D8B; }

        .footer { text-align: center; padding: 30px 20px; color: var(--text-secondary); font-size: 0.85rem; border-top: 1px solid var(--border); }
        .footer strong { color: var(--metro-blue); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        @media print {
            .header { padding: 20px; }
            .search-container, .filter-container, .recent-section, .theme-toggle, .card-actions { display: none !important; }
            .phrase-card { break-inside: avoid; page-break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
            body { background: white; }
        }
    </style>

                ]

            {
                category: "Closing / Wrap-Up",
                catClass: "cat-closing",
                icon: "&#128077;",
                items: [
                    { label: "Call Closing", text: "I understand you want to make sure everything is resolved. Let me confirm the details and ensure you're satisfied before we wrap up." },
                    { label: "Follow-Up Scheduled", text: "I understand you need a follow-up on this matter. Let me schedule that for you and make sure you have all the details." },
                    { label: "Survey Request", text: "I understand your time is valuable. If you have a moment after our call, your feedback would help us improve our service." }
                ]

        ];

        let currentFilter = 'all';
        let searchQuery = '';
        let favorites = JSON.parse(localStorage.getItem('metroFavorites') || '[]');
        let recent = JSON.parse(localStorage.getItem('metroRecent') || '[]');
        let darkMode = localStorage.getItem('metroDarkMode') === 'true';

        const content = document.getElementById('content');
        const searchBox = document.getElementById('searchBox');
        const searchStats = document.getElementById('searchStats');
        const filterContainer = document.getElementById('filterContainer');
        const toast = document.getElementById('toast');
        const toastText = document.getElementById('toastText');
        const recentSection = document.getElementById('recentSection');
        const recentChips = document.getElementById('recentChips');
        const themeToggle = document.getElementById('themeToggle');

        function init() {
            if (darkMode) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️ Light';
            }
            renderRecent();
            renderFilters();
            renderContent();
            setupEventListeners();
        }

        function toggleTheme() {
            darkMode = !darkMode;
            if (darkMode) {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️ Light';
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeToggle.textContent = '🌙 Dark';
            }
            localStorage.setItem('metroDarkMode', darkMode);
        }

        function renderRecent() {
            if (recent.length === 0) {
                recentSection.classList.remove('visible');
                return;
            }
            recentSection.classList.add('visible');
            recentChips.innerHTML = recent.map(r => 
                `<div class="recent-chip" onclick="searchBox.value='${r.replace(/'/g, "\'")}'; searchBox.dispatchEvent(new Event('input'));">${r}</div>`
            ).join('');
        }

        function addRecent(label) {
            recent = recent.filter(r => r !== label);
            recent.unshift(label);
            if (recent.length > 5) recent = recent.slice(0, 5);
            localStorage.setItem('metroRecent', JSON.stringify(recent));
            renderRecent();
        }

        function renderFilters() {
            const allCount = data.reduce((sum, cat) => sum + cat.items.length, 0);
            let html = `<div class="filter-pill ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">All <span class="count">${allCount}</span></div>`;
            data.forEach(cat => {
                html += `<div class="filter-pill ${currentFilter === cat.category ? 'active' : ''}" data-filter="${cat.category}">${cat.category} <span class="count">${cat.items.length}</span></div>`;
            });
            html += `<div class="filter-pill ${currentFilter === 'favorites' ? 'active' : ''}" data-filter="favorites">⭐ Favorites <span class="count">${favorites.length}</span></div>`;
            filterContainer.innerHTML = html;
        }

        function renderContent() {
            let filteredData = data;
            let totalCount = 0;

            if (currentFilter !== 'all' && currentFilter !== 'favorites') {
                filteredData = data.filter(cat => cat.category === currentFilter);
            }

            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filteredData = filteredData.map(cat => ({
                    ...cat,
                    items: cat.items.filter(item => 
                        item.label.toLowerCase().includes(query) || 
                        item.text.toLowerCase().includes(query) ||
                        cat.category.toLowerCase().includes(query)
                    )
                })).filter(cat => cat.items.length > 0);
            }

            if (currentFilter === 'favorites') {
                filteredData = data.map(cat => ({
                    ...cat,
                    items: cat.items.filter(item => favorites.includes(item.label))
                })).filter(cat => cat.items.length > 0);
            }

            totalCount = filteredData.reduce((sum, cat) => sum + cat.items.length, 0);

            if (searchQuery) {
                searchStats.textContent = `Found ${totalCount} phrase${totalCount !== 1 ? 's' : ''} for "${searchQuery}"`;
            } else if (currentFilter === 'favorites') {
                searchStats.textContent = `${totalCount} favorite phrase${totalCount !== 1 ? 's' : ''}`;
            } else if (currentFilter !== 'all') {
                searchStats.textContent = `${totalCount} phrases in ${currentFilter}`;
            } else {
                searchStats.textContent = `Showing all ${totalCount} phrases`;
            }

            if (totalCount === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#128269;</div>
                        <h3>No phrases found</h3>
                        <p>Try adjusting your search or filter to find what you are looking for.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filteredData.forEach((cat, index) => {
                html += `
                    <div class="category-section ${cat.catClass}" style="animation-delay: ${index * 0.05}s">
                        <div class="category-header">
                            <div class="category-icon">${cat.icon}</div>
                            <div class="category-title">${cat.category}</div>
                            <div class="category-count">${cat.items.length}</div>
                        </div>
                        <div class="cards-grid">
                            ${cat.items.map(item => {
                                const safeText = item.text.replace(/'/g, "\'").replace(/"/g, '&quot;');
                                const safeLabel = item.label.replace(/'/g, "\'");
                                return `
                                <div class="phrase-card ${cat.catClass}" data-label="${safeLabel}" data-text="${safeText}">
                                    <div class="card-label">${item.label}</div>
                                    <div class="card-text">"${item.text}"</div>
                                    <div class="card-actions">
                                        <button class="action-btn copy" onclick="event.stopPropagation(); copyPhrase('${safeText}', '${safeLabel}', this)">
                                            &#128203; Copy
                                        </button>
                                        <button class="action-btn fav ${favorites.includes(item.label) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${safeLabel}', this)">
                                            ${favorites.includes(item.label) ? '⭐ Favorited' : '☆ Favorite'}
                                        </button>
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });

            content.innerHTML = html;
        }

        function copyPhrase(text, label, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const card = btn.closest('.phrase-card');
                card.classList.add('copied');
                setTimeout(() => card.classList.remove('copied'), 600);
                showToast('✅ Copied to clipboard!');
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => { btn.innerHTML = '&#128203; Copy'; }, 2000);
                addRecent(label);
            });
        }

        function toggleFavorite(label, btn) {
            const index = favorites.indexOf(label);
            if (index > -1) {
                favorites.splice(index, 1);
                btn.classList.remove('active');
                btn.innerHTML = '☆ Favorite';
                showToast('☆ Removed from favorites');
            } else {
                favorites.push(label);
                btn.classList.add('active');
                btn.innerHTML = '⭐ Favorited';
                showToast('⭐ Added to favorites!');
            }
            localStorage.setItem('metroFavorites', JSON.stringify(favorites));
            renderFilters();
            if (currentFilter === 'favorites') {
                renderContent();
            }
        }

        function showToast(message) {
            toastText.textContent = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        function setupEventListeners() {
            searchBox.addEventListener('input', (e) => {
                searchQuery = e.target.value.trim();
                renderContent();
            });

            filterContainer.addEventListener('click', (e) => {
                const pill = e.target.closest('.filter-pill');
                if (!pill) return;
                currentFilter = pill.dataset.filter;
                renderFilters();
                renderContent();
            });

            content.addEventListener('click', (e) => {
                if (e.target.closest('.action-btn')) return;
                const card = e.target.closest('.phrase-card');
                if (card) {
                    const text = card.dataset.text;
                    const label = card.dataset.label;
                    navigator.clipboard.writeText(text).then(() => {
                        card.classList.add('copied');
                        setTimeout(() => card.classList.remove('copied'), 600);
                        showToast('✅ Copied to clipboard!');
                        addRecent(label);
                    });
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement !== searchBox) {
                    e.preventDefault();
                    searchBox.focus();
                }
            });
        }

        init();
    </script>
